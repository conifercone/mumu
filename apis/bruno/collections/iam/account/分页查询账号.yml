info:
  name: 分页查询账号
  type: http
  seq: 5
  tags:
    - account

http:
  method: GET
  url: "{{iam-service-url}}/account/findAll?current=1&pageSize=10"
  params:
    - name: current
      value: "1"
      type: query
    - name: pageSize
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
