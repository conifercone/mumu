info:
  name: 校验账号密码
  type: http
  seq: 11
  tags:
    - account

http:
  method: GET
  url: "{{iam-service-url}}/account/verifyPassword?password=admin"
  params:
    - name: password
      value: admin
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
