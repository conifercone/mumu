info:
  name: 获取直系后代角色
  type: http
  seq: 13

http:
  method: GET
  url: "{{iam-service-url}}/role/findDirect?current=1&pageSize=10&ancestorId=1"
  params:
    - name: current
      value: "1"
      type: query
    - name: pageSize
      value: "10"
      type: query
    - name: ancestorId
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
