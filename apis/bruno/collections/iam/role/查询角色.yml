info:
  name: 查询角色
  type: http
  seq: 3

http:
  method: GET
  url: "{{iam-service-url}}/role/findAll?current=1&pageSize=10&code=admin"
  params:
    - name: current
      value: "1"
      type: query
    - name: pageSize
      value: "10"
      type: query
    - name: code
      value: admin
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
