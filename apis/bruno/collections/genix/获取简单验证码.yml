info:
  name: 获取简单验证码
  type: http
  seq: 2

http:
  method: GET
  url: "{{genix-service-url}}/captchaCode/generate?ttl=400&length=4"
  params:
    - name: ttl
      value: "400"
      type: query
    - name: length
      value: "4"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
